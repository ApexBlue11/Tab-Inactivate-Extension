<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 340px;
      max-height: 500px;
      font-family: system-ui, sans-serif;
      font-size: 13px;
      background: #1e1e2e;
      color: #cdd6f4;
      overflow: hidden;
    }

    header {
      padding: 10px 14px;
      background: #181825;
      border-bottom: 1px solid #313244;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header span {
      font-weight: 600;
      font-size: 13px;
      letter-spacing: 0.3px;
    }

    #discard-all {
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 4px;
      border: 1px solid #45475a;
      background: #313244;
      color: #cdd6f4;
      cursor: pointer;
    }
    #discard-all:hover { background: #45475a; }

    #tab-list {
      overflow-y: auto;
      max-height: 452px;
    }

    .tab-row {
      display: flex;
      align-items: center;
      padding: 7px 10px;
      gap: 8px;
      border-bottom: 1px solid #181825;
      transition: background 0.1s;
    }
    .tab-row:hover { background: #272738; }
    .tab-row.discarded { opacity: 0.45; }

    .favicon {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      border-radius: 2px;
    }

    .tab-info {
      flex: 1;
      overflow: hidden;
    }

    .tab-title {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 220px;
    }

    .tab-badge {
      font-size: 10px;
      color: #6c7086;
      margin-top: 1px;
    }

    .badge-discarded { color: #f38ba8; }
    .badge-active    { color: #a6e3a1; }

    .btn-discard {
      flex-shrink: 0;
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 4px;
      border: none;
      cursor: pointer;
      background: #313244;
      color: #89b4fa;
    }
    .btn-discard:hover:not(:disabled) { background: #45475a; }
    .btn-discard:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <header>
    <span>Tab Inactivate</span>
    <button id="discard-all">Discard all inactive</button>
  </header>
  <div id="tab-list"></div>
  <script src="popup.js"></script>
</body>
</html>
